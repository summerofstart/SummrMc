# ============================================================================
# docker-compose.yml — McOpt Minecraft Server with Folia-aware optimizer
# All-in-one JAR: native .so is embedded inside mc-opt-agent.jar
# Usage: docker compose up -d
# ============================================================================

services:
  mc-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mc-optimized
    ports:
      - "25565:25565"
    volumes:
      - ./mc-data:/data
    environment:
      # JVM flags (optional — McOpt auto-tunes if not set)
      # - JVM_FLAGS=-Xmx8G -Xms8G -XX:+UseZGC

      # Force Folia mode (auto-detected from JAR if not set)
      # - FOLIA_FORCE=1

      # Debug mode (logs GC to /data/gc.log)
      - DEBUG=0

      # Server JAR path inside /data (auto-detected if not set)
      # - SERVER_JAR=/data/folia-server.jar
    cap_add:
      - SYS_ADMIN   # Required for kernel tuning (sysctl, scheduler)
      - IPC_LOCK    # Required for hugepages
    restart: unless-stopped
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '12'
          memory: 32G
        reservations:
          cpus: '4'
          memory: 4G
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    tmpfs:
      - /dev/hugepages:rw,size=1G
    healthcheck:
      test: ["CMD-SHELL", "lsof -i :25565 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s