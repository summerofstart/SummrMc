# ============================================================================
# docker-compose.yml — McOpt Minecraft Server with Folia-aware optimizer
# Unified launcher image: /opt/server.jar embeds mc-opt-agent.jar.
# Usage: docker compose up -d
# ============================================================================

services:
  mc-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mc-optimized
    ports:
      - "25565:25565"
    volumes:
      - ./mc-data:/data
    environment:
      # JVM flags (optional — McOpt auto-tunes if not set)
      # - MC_HEAP_MB=8192
      # - MC_JVM_EXTRA=-XX:+UseZGC

      # Force Folia mode (auto-detected from JAR if not set)
      # - FOLIA_FORCE=1

      # Server JAR path inside /data (auto-detected if not set)
      # - SERVER_JAR=/data/server.paperclip.jar
    restart: unless-stopped
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: '12'
          memory: 32G
        reservations:
          cpus: '4'
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "lsof -i :25565 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
